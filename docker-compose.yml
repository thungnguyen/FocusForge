version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: focusforge-mysql
    restart: always
    environment:
      MYSQL_DATABASE: focusforge_db
      MYSQL_USER: focusforge_user
      MYSQL_PASSWORD: focusforge_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
